<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Taler">
<meta name="theme-color" content="#f8f5f0">
<title>Taler</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;1,9..40,300&display=swap');

:root {
  --bg: #f8f5f0;
  --bg2: #eeebe4;
  --bg3: #e4e0d8;
  --border: rgba(40,28,10,0.08);
  --border2: rgba(40,28,10,0.14);
  --text: #1e1a14;
  --text2: rgba(30,26,20,0.55);
  --text3: rgba(30,26,20,0.33);
  --accent: #b87820;
  --accent2: rgba(184,120,32,0.12);
  --green: #3a8a3a;
  --green2: rgba(58,138,58,0.12);
  --red: #b84040;
  --radius: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100svh;
  max-width: 480px;
  margin: 0 auto;
  padding: calc(var(--safe-top) + 56px) 0 calc(var(--safe-bottom) + 72px);
  overflow-x: hidden;
}

/* NAV */
.topbar {
  position: fixed;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  background: var(--bg);
  border-bottom: 0.5px solid var(--border);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar-title {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.12em;
  color: var(--text);
  text-transform: uppercase;
}
.topbar-score {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.06em;
}

.bottomnav {
  position: fixed;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  padding: 10px 0 calc(var(--safe-bottom) + 10px);
  background: var(--bg);
  border-top: 0.5px solid var(--border);
  display: flex;
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 4px 0;
  transition: color 0.15s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 20px; height: 20px; }

/* PAGES */
.page { display: none; padding: 20px; }
.page.active { display: block; }

/* HOME */
.big-score {
  text-align: center;
  padding: 28px 0 24px;
}
.big-score .num {
  font-family: 'DM Mono', monospace;
  font-size: 72px;
  font-weight: 300;
  color: var(--text);
  line-height: 1;
  letter-spacing: -0.02em;
}
.big-score .unit {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 6px;
}

.progress-section { margin-bottom: 28px; }
.progress-row {
  display: flex;
  justify-content: space-between;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.bar { height: 2px; background: var(--bg3); border-radius: 1px; position: relative; }
.bar-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width 0.5s ease; }
.milestone-dots {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}
.m-dot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.m-dot .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--border2);
}
.m-dot.reached .dot { background: var(--accent); border-color: var(--accent); }
.m-dot .label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 0.06em;
}

.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.actions { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }

.action-card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, transform 0.1s;
  user-select: none;
  -webkit-user-select: none;
}
.action-card:active { transform: scale(0.98); background: var(--bg3); }

.action-pts-badge {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: var(--accent2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.action-pts-badge span {
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  font-weight: 500;
  color: var(--accent);
}
.action-info { flex: 1; min-width: 0; }
.action-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.action-sub {
  font-size: 12px;
  color: var(--text2);
}
.action-arrow {
  color: var(--text3);
  font-size: 18px;
  flex-shrink: 0;
}

/* REWARDS */
.reward-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
.reward-card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.reward-card.unlocked { border-color: rgba(212,168,83,0.3); }
.reward-threshold {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text3);
  min-width: 52px;
  letter-spacing: 0.04em;
}
.reward-card.unlocked .reward-threshold { color: var(--accent); }
.reward-info { flex: 1; }
.reward-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
}
.reward-name.empty { color: var(--text3); font-style: italic; font-weight: 300; }
.reward-status {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.06em;
}
.reward-card.unlocked .reward-status { color: var(--green); }
.reward-status:not(.unlocked) { color: var(--text3); }
.reward-edit {
  background: none;
  border: 0.5px solid var(--border2);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--text2);
  cursor: pointer;
  letter-spacing: 0.04em;
}
.reward-edit:active { background: var(--bg3); }

/* LOG PAGE */
.log-list { display: flex; flex-direction: column; gap: 6px; }
.log-entry {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.log-entry-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.log-entry-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.log-entry-pts {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.04em;
}
.log-entry-note {
  font-size: 13px;
  color: var(--text2);
  font-style: italic;
}
.log-entry-date {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.06em;
}
.empty-log {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 14px;
  line-height: 1.7;
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  width: 100%;
  max-width: 480px;
  background: var(--bg2);
  border-top: 0.5px solid var(--border2);
  border-radius: 20px 20px 0 0;
  padding: 0 20px calc(var(--safe-bottom) + 24px);
  transform: translateY(30px);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 12px auto 20px;
}
.modal-title {
  font-size: 17px;
  font-weight: 500;
  margin-bottom: 6px;
}
.modal-sub {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 20px;
}
.modal-confirm {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  color: #0f0f0f;
  border: none;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 4px;
  transition: opacity 0.15s;
}
.modal-confirm:active { opacity: 0.85; }
.modal-cancel {
  width: 100%;
  padding: 14px;
  background: none;
  color: var(--text2);
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  cursor: pointer;
  margin-top: 8px;
}

.note-input {
  width: 100%;
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-radius: 10px;
  padding: 12px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--text);
  resize: none;
  height: 80px;
  margin-bottom: 8px;
  outline: none;
}
.note-input:focus { border-color: rgba(212,168,83,0.4); }
.note-input::placeholder { color: var(--text3); }

/* FLASH */
.flash {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0.8);
  background: var(--accent);
  color: #0f0f0f;
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  font-weight: 500;
  padding: 18px 32px;
  border-radius: 16px;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  letter-spacing: 0.04em;
  transition: none;
}
.flash.show {
  animation: flashAnim 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes flashAnim {
  0% { opacity:0; transform:translate(-50%,-50%) scale(0.7); }
  30% { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
  70% { opacity:1; transform:translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-50%) scale(1); }
}

/* Edit reward input */
.edit-input {
  width: 100%;
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-radius: 10px;
  padding: 12px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--text);
  outline: none;
  margin-bottom: 16px;
}
.edit-input:focus { border-color: rgba(212,168,83,0.4); }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">TALER</span>
  <span class="topbar-score" id="topScore">3 pt</span>
</div>

<!-- PAGES -->
<div id="page-home" class="page active">
  <div class="big-score">
    <div class="num" id="bigNum">3</div>
    <div class="unit">Point</div>
  </div>

  <div class="progress-section">
    <div class="progress-row">
      <span>FREMGANG</span>
      <span id="progressLabel">3 / 100</span>
    </div>
    <div class="bar"><div class="bar-fill" id="barFill" style="width:3%"></div></div>
    <div class="milestone-dots">
      <div class="m-dot" id="md0"><div class="dot"></div><div class="label">0</div></div>
      <div class="m-dot" id="md10"><div class="dot"></div><div class="label">10</div></div>
      <div class="m-dot" id="md30"><div class="dot"></div><div class="label">30</div></div>
      <div class="m-dot" id="md100"><div class="dot"></div><div class="label">100</div></div>
    </div>
  </div>

  <div class="section-label">Registrér</div>
  <div class="actions">
    <div class="action-card" onclick="openLog('stor-forsamling')">
      <div class="action-pts-badge"><span>1</span></div>
      <div class="action-info">
        <div class="action-name">Tag ordet i stor forsamling</div>
        <div class="action-sub">Centermøde, plenum, større møde</div>
      </div>
      <div class="action-arrow">›</div>
    </div>
    <div class="action-card" onclick="openLog('staa-op')">
      <div class="action-pts-badge"><span>2</span></div>
      <div class="action-info">
        <div class="action-name">Stå op når du taler</div>
        <div class="action-sub">Frem for at sidde ned i gruppen</div>
      </div>
      <div class="action-arrow">›</div>
    </div>
    <div class="action-card" onclick="openLog('sig-ja')">
      <div class="action-pts-badge"><span>3</span></div>
      <div class="action-info">
        <div class="action-name">Sig ja og gennemfør</div>
        <div class="action-sub">Få og brug ordet i en gruppe</div>
      </div>
      <div class="action-arrow">›</div>
    </div>
  </div>
</div>

<div id="page-log" class="page">
  <div class="section-label" style="margin-bottom:16px">Aktivitetslog</div>
  <div class="log-list" id="logList"></div>
</div>

<div id="page-rewards" class="page">
  <div class="section-label" style="margin-bottom:16px">Belønninger</div>
  <div class="reward-list" id="rewardList"></div>
  <div style="margin-top:16px;padding-top:16px;border-top:0.5px solid var(--border)">
    <button onclick="if(confirm('Nulstil al data?')){resetAll()}" style="background:none;border:none;color:var(--text3);font-size:12px;font-family:'DM Mono',monospace;letter-spacing:0.06em;cursor:pointer;text-transform:uppercase">Nulstil tracker</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottomnav">
  <button class="nav-btn active" id="nav-home" onclick="switchPage('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M3 12L12 4l9 8v9a1 1 0 01-1 1H5a1 1 0 01-1-1v-9z"/>
    </svg>
    Hjem
  </button>
  <button class="nav-btn" id="nav-log" onclick="switchPage('log')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
    </svg>
    Log
  </button>
  <button class="nav-btn" id="nav-rewards" onclick="switchPage('rewards')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <circle cx="12" cy="8" r="4"/><path d="M8 14l-2 7 6-3 6 3-2-7"/>
    </svg>
    Belønninger
  </button>
</nav>

<!-- LOG MODAL -->
<div class="modal-overlay" id="logModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-sub" id="modalSub"></div>
    <textarea class="note-input" id="noteInput" placeholder="Tilføj en note (valgfrit)…"></textarea>
    <button class="modal-confirm" onclick="confirmLog()">Registrér</button>
    <button class="modal-cancel" onclick="closeModal()">Afbryd</button>
  </div>
</div>

<!-- EDIT REWARD MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="editModalTitle"></div>
    <div class="modal-sub">Hvad vil du belønne dig selv med?</div>
    <input class="edit-input" id="editInput" type="text" placeholder="Fx en god middag, ny bog…">
    <button class="modal-confirm" onclick="saveReward()">Gem</button>
    <button class="modal-cancel" onclick="closeEditModal()">Afbryd</button>
  </div>
</div>

<div class="flash" id="flash"></div>

<script>
const ACTIONS = {
  'sig-ja':         { name:'Sig ja og gennemfør',      sub:'Gruppe',         pts:3 },
  'staa-op':        { name:'Stå op når du taler',       sub:'Grupper',        pts:2 },
  'stor-forsamling':{ name:'Tag ordet i stor forsamling',sub:'Plenum/center',  pts:1 },
  'centermøde-ai':  { name:'Forberedt oplæg',            sub:'Præsentation',   pts:3 }
};

const DEFAULT_STATE = {
  score: 3,
  log: [{ id:'centermøde-ai', name:'Centermøde AI-oplæg', pts:3, note:'Intro til AI-handlingsplan', date: new Date().toISOString() }],
  rewards: { 10: 'Hario V60 Neo (1 kop)', 30: 'CAP 0.5 — Evergoods', 100: 'deBuyer Carbone Plus 28 cm' }
};

let state;
try { state = JSON.parse(localStorage.getItem('taler_state')) || DEFAULT_STATE; }
catch(e) { state = DEFAULT_STATE; }
if(!state.rewards) state.rewards = DEFAULT_STATE.rewards;
const PREV_DEFAULTS = { 10: 'Hario V60-02 tragt (3-4 kopper)' };
Object.keys(DEFAULT_STATE.rewards).forEach(k => { if(!state.rewards[k] || state.rewards[k] === PREV_DEFAULTS[k]) state.rewards[k] = DEFAULT_STATE.rewards[k]; });

let pendingAction = null;
let editingRewardPts = null;

function save() { localStorage.setItem('taler_state', JSON.stringify(state)); }

function fmtDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = Math.floor((now - d) / 86400000);
  if(diff === 0) return 'i dag';
  if(diff === 1) return 'i går';
  return d.toLocaleDateString('da-DK', {day:'numeric', month:'short'});
}

function render() {
  const s = state.score;
  document.getElementById('bigNum').textContent = s;
  document.getElementById('topScore').textContent = s + ' pt';
  document.getElementById('progressLabel').textContent = s + ' / 100';
  document.getElementById('barFill').style.width = Math.min(100, s) + '%';

  [0,10,30,100].forEach(m => {
    const el = document.getElementById('md'+m);
    if(el) el.classList.toggle('reached', s >= m);
  });

  // Log
  const ll = document.getElementById('logList');
  if(state.log.length === 0) {
    ll.innerHTML = '<div class="empty-log">Ingen aktiviteter endnu.<br>Gå til Hjem og registrér din første.</div>';
  } else {
    ll.innerHTML = [...state.log].reverse().map(e => `
      <div class="log-entry">
        <div class="log-entry-top">
          <span class="log-entry-name">${e.name}</span>
          <span class="log-entry-pts">+${e.pts} pt</span>
        </div>
        ${e.note ? `<div class="log-entry-note">${e.note}</div>` : ''}
        <div class="log-entry-date">${fmtDate(e.date)}</div>
      </div>
    `).join('');
  }

  // Rewards
  const rl = document.getElementById('rewardList');
  rl.innerHTML = [10,30,100].map(pts => {
    const unlocked = s >= pts;
    const name = state.rewards[pts];
    return `
      <div class="reward-card ${unlocked ? 'unlocked' : ''}">
        <div class="reward-threshold">${pts} pt</div>
        <div class="reward-info">
          <div class="reward-name ${name ? '' : 'empty'}">${name || 'Ikke sat endnu'}</div>
          <div class="reward-status ${unlocked ? 'unlocked' : ''}">${unlocked ? 'OPTJENT' : 'LÅST'}</div>
        </div>
        <button class="reward-edit" onclick="openEditReward(${pts})">Rediger</button>
      </div>
    `;
  }).join('');
}

function switchPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
}

function openLog(id) {
  pendingAction = id;
  const a = ACTIONS[id];
  document.getElementById('modalTitle').textContent = a.name;
  document.getElementById('modalSub').textContent = '+' + a.pts + ' point';
  document.getElementById('noteInput').value = '';
  document.getElementById('logModal').classList.add('open');
  setTimeout(() => document.getElementById('noteInput').focus(), 350);
}

function closeModal() {
  document.getElementById('logModal').classList.remove('open');
  pendingAction = null;
}

function confirmLog() {
  if(!pendingAction) return;
  const a = ACTIONS[pendingAction];
  const note = document.getElementById('noteInput').value.trim();
  const prev = state.score;
  state.score += a.pts;
  state.log.push({ id:pendingAction, name:a.name, pts:a.pts, note, date:new Date().toISOString() });
  save(); render(); closeModal();
  showFlash('+' + a.pts);
  [10,30,100].forEach(m => { if(state.score >= m && prev < m) setTimeout(()=>showFlash('🎯 '+m+' pt!'),800); });
}

function showFlash(msg) {
  const f = document.getElementById('flash');
  f.textContent = msg;
  f.classList.remove('show');
  void f.offsetWidth;
  f.classList.add('show');
}

function openEditReward(pts) {
  editingRewardPts = pts;
  document.getElementById('editModalTitle').textContent = 'Belønning ved ' + pts + ' point';
  document.getElementById('editInput').value = state.rewards[pts] || '';
  document.getElementById('editModal').classList.add('open');
  setTimeout(() => document.getElementById('editInput').focus(), 350);
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
  editingRewardPts = null;
}

function saveReward() {
  if(editingRewardPts === null) return;
  state.rewards[editingRewardPts] = document.getElementById('editInput').value.trim();
  save(); render(); closeEditModal();
}

function resetAll() {
  state = { score:0, log:[], rewards:{10:'',30:'CAP 0.5 — Evergoods',100:''} };
  save(); render();
}

// Close modal on overlay click
document.getElementById('logModal').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
document.getElementById('editModal').addEventListener('click', function(e) { if(e.target===this) closeEditModal(); });

render();
</script>
</body>
</html>
